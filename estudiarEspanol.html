function generateQuestions()
{
if (document.getElementById("L1").checked == false && document.getElementById("L2").checked == false && document.getElementById("L3").checked == false && document.getElementById("L4").checked == false)
{
alert("You must select at least one lesson!")
}
else
{
if (document.getElementById("L1").checked == true)
{
    Questions = Questions.concat(EngL1)
    Answers = Answers.concat(EspL1)
}
if (document.getElementById("L2").checked == true)
{
    Questions = Questions.concat(EngL2)
    Answers = Answers.concat(EspL2)
}
if (document.getElementById("L3").checked == true)
{
    Questions = Questions.concat(EngL3)
    Answers = Answers.concat(EspL3)
}
if (document.getElementById("L4").checked == true)
{
    Questions = Questions.concat(EngL4)
    Answers = Answers.concat(EspL4)
}
document.getElementById("gameField").innerHTML="<button class='genQuestion' onClick='startGame()'>Start Game!</button>"
}
}
function startGame()
{
     totalRemaining = Questions.length
     currentQuestion = Math.floor(Math.random()*totalRemaining)
     questionNow = Questions[currentQuestion] 
     answerNow = Answers[currentQuestion]
    document.getElementById("gameField").innerHTML="Write the following vocabulary in spanish. <br/><div id='inEnglish'>" + questionNow + "</div><br/><br/><input class='answerBox' id='inSpanish'><br/><br/><button class='genQuestion' onClick='guessAnswer()'>Submit</button>"
}
function guessAnswer()
{
if (Questions.length>1)
{
var guessedAns = document.getElementById("inSpanish").value
if (guessedAns != Answers[currentQuestion])
{
realEnglish=realEnglish+Questions[currentQuestion]+"<br/>"
realSpanish=realSpanish+Answers[currentQuestion]+"<br/>"
errorSpanish=errorSpanish+guessedAns+"<br/>"
totalErrors=totalErrors*1+1
}
totalQuestions=totalQuestions*1+1
Questions.splice(currentQuestion,1)
Answers.splice(currentQuestion,1)
totalRemaining = Questions.length
currentQuestion = Math.floor(Math.random()*totalRemaining)
questionNow = Questions[currentQuestion] 
answerNow = Answers[currentQuestion]
document.getElementById("inEnglish").innerHTML=questionNow
}
else
{
    guessedAns = document.getElementById("inSpanish").value
if (guessedAns != Answers[currentQuestion])
{
realEnglish=realEnglish+Questions[currentQuestion]+"<br/>"
realSpanish=realSpanish+Answers[currentQuestion]+"<br/>"
errorSpanish=errorSpanish+guessedAns+"<br/>"
totalErrors=totalErrors*1+1
}
totalQuestions=totalQuestions*1+1
var percentCorrect= (totalQuestions-totalErrors)/totalQuestions
percentCorrect=percentCorrect*100
document.getElementById("gameField").innerHTML="You are finished. You got "+percentCorrect+"% correct.<br/><table classs='errorTable'><tr><td>"+realEnglish+"</td><td>"+realSpanish+"</td><td>"+errorSpanish+"</td></tr></table>"
}
}
