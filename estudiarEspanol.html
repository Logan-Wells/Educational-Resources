<!DOCTYPE html>

<head>
<link href='https://fonts.googleapis.com/css?family=Lexend' rel='stylesheet'>
<title>Espanol</title>
<style>
body
{
background-image: linear-Gradient(to bottom right,rgb(203, 188, 240),rgb(174, 147, 236) ,#412685);
min-height: 100vh;
}
.background
{
color:#351c75;
font-family: Lexend;
}
.webHead
{
font-size: 50px;
}
.horizRule
{
border: 2px, solid,#351c75;
}
.home
{
height: 50px;
width: 50px;
position: absolute;
margin-left:95vw
}
.genQuestion
{
color:#351c75;
background-color:rgb(174, 147, 236);
border: 2px, solid, #351c75;
height: 80px;
width: 400px;
font-family: Lexend;
font-size: 30px;
transition: 0.5s;
}
.genQuestion:hover
{
color:#a28ed4;
background-color:rgb(107, 84, 161);
}
.genQuestion:active
{
background-color:rgb(61, 36, 121);
transform: scale(0.95);
}
.checkBoxes
{
background-color:rgb(107, 84, 161);
}
.checkContainer
{
font-size:20px;
position: relative;
margin-left: 30px;
transition:0.5s;
}
.checkMark
{
background-color:#a28ed4;
border: 1px, solid, #412685;
height:20px;
width:20px;
top:1px;
position:absolute;
transition:0.5s;
}
.checkContainer input
{
position:absolute;
opacity:0;
height:0;
width:0;
}
.checkContainer:hover input ~ .checkMark
{
background-color:#9175da;
}
.checkContainer input:checked ~ .checkMark
{
background-color:#412685;
border-color:#9175da;
}
</style>
</head>
